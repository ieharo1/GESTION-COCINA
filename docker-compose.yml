version: '3.8'

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: cocina-app
        container_name: cocina_app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
        networks:
            - app-network

    nginx:
        image: nginx:alpine
        container_name: cocina_nginx
        restart: unless-stopped
        ports:
            - "8003:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - app-network

    mysql:
        image: mysql:8.0
        container_name: cocina_mysql
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: cocina_system
            MYSQL_ROOT_PASSWORD: root
            MYSQL_PASSWORD: root
            MYSQL_USER: root
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - app-network

networks:
    app-network:
        driver: bridge

volumes:
    dbdata:
        driver: local
